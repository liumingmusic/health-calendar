<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="养生日历 · 以二十四节气、七十二候、十二时辰为纲的传统时令养生小站" />
  <title>养生日历 · 天人合一 顺应四时</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="scroll-wrap">
    <header class="site-header">
      <div class="brand">
        <span class="seal" aria-hidden="true">養生</span>
        <div class="brand-text">
          <h1>养生日历</h1>
          <p class="subtitle">天人合一 · 顺应四时</p>
        </div>
      </div>
      <div class="meta">
        <div class="today-date" id="todayDate">—</div>
        <div class="focus-row">
          <div class="badge term-badge" id="termBadge"><span class="badge-label">当前节气</span><span class="badge-main">—</span></div>
          <div class="badge hour-badge" id="hourBadge"><span class="badge-label">当前时辰</span><span class="badge-main">—</span></div>
        </div>
      </div>
    </header>

    <main class="layout">
      <!-- 左：全年总览 -->
      <aside class="panel overview" id="overview">
        <div class="panel-head">
          <h2>全年总览</h2>
          <div class="season-tabs" id="seasonTabs"></div>
        </div>
        <div class="term-grid" id="termGrid"></div>
      </aside>

      <!-- 右：主内容 -->
      <div class="content">
        <!-- 今日养生主卡 -->
        <section class="panel main-card" id="mainCard">
          <div class="panel-head">
            <h2>今日养生</h2>
            <span class="season-chip" id="seasonChip">—</span>
          </div>
          <div class="card-body" id="cardBody">
            <p class="loading">正在推算今日节气与时辰……</p>
          </div>
        </section>

        <!-- 十二时辰条 -->
        <section class="panel hour-bar-panel">
          <div class="panel-head"><h2>十二时辰 · 子午流注</h2></div>
          <div class="hour-bar" id="hourBar"></div>
          <div class="hour-detail" id="hourDetail"></div>
        </section>

        <!-- 七十二候 -->
        <section class="panel hou-panel">
          <div class="panel-head">
            <h2>七十二候</h2>
            <button class="link-btn" id="toggleHouYear" type="button">查看全年候历</button>
          </div>
          <div class="hou-current" id="houCurrent"></div>
          <div class="hou-year hidden" id="houYear"></div>
        </section>

        <!-- 打卡区 -->
        <section class="panel checkin-panel">
          <div class="panel-head">
            <h2>每日微习惯打卡</h2>
            <span class="streak" id="streakLabel">—</span>
          </div>
          <div class="habits" id="habits"></div>
          <p class="checkin-tip">打卡记录仅保存在本机浏览器（localStorage），用于见证你的坚持。</p>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <p class="maxim">「法于阴阳，和于术数，食饮有节，起居有常。」—— 《黄帝内经·素问》</p>
      <p class="foot-note">养生日历 · 纯静态离线小站 · 内容仅为传统养生参考，不替代专业医疗</p>
    </footer>
  </div>

  <!-- 详情弹层 -->
  <div class="modal hidden" id="modal" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card">
      <button class="modal-close" id="modalClose" type="button" aria-label="关闭">×</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
